DATA:
  data_name: DIV2K
  data_root: Data/
  train_set: list/train.txt
  val_set: list/val.txt
  loop: 1
  patch_size: 192
  hflip: True
  rotation: True
  rgb_range: 1.0
  debug: False
  balanceS: True

LOSS:
  loss_lr_weight: 1.0

NETWORK:
  base_resolution: 4
  arch: InvEDRS_arb
  up_sampler: sampleB
  down_sampler: sampleB
  n_resblocks: 16
  n_feats: 64
  fixed_scale: False
  scale: 4
  rescale:
  n_colors: 3
  res_scale: 1
  quantization: True
  quantization_type: round_soft
  K: 4
  num_experts_SAconv: 4
  num_experts_CRM: 8
  jpeg: False

TRAIN:
  use_sgd: False
  sync_bn: False
  train_gpu: []
  workers: 2
  batch_size: 1
  batch_size_val: 1
  base_lr: 0.0001
  StepLR: True
  step_size: 60
  gamma: 0.5
  adaptive_lr: False
  factor: 0.3
  patience: 3
  threshold: 0.00025
  poly_lr: False
  epochs: 300
  start_epoch: 0
  power: 0.9
  momentum: 0.9
  weight_decay: 0.002
  manual_seed: 131
  print_freq: 10
  save_freq: 1
  save_path:
  weight:
  resume:
  evaluate: True
  eval_freq: 1
  use_cuda: False

Distributed:
  dist_url: tcp://127.0.0.1:6799
  dist_backend: gloo
  multiprocessing_distributed: False
  world_size: 1
  rank: 0

TEST:
  exp_name: AIDN
  test_root: Data/
  test_dataset: Set5
  test_scale: 1.5
  save: True
  split: val
  test_workers: 1
  test_gpu: []
  test_batch_size: 1
  model_path: LOG/DIV2K/pre-train/AIDN.pth.tar
  save_folder: results
